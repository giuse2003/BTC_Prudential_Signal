name: Telegram command listener

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: telegram-command-listener
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependency
        run: pip install requests

      - name: Configure Telegram command menu
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
            --header "Content-Type: application/json" \
            --data '{"commands":[{"command":"segnale","description":"Mostra il segnale BTC corrente"},{"command":"help","description":"Mostra i comandi disponibili"}]}'

      - name: Process Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_command.py
