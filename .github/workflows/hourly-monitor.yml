name: Hourly BTC monitor (Telegram)

on:
  schedule:
    - cron: "0 * * * *" # ogni ora
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore monitor state (cache)
        id: cache-state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Coppia spot Coinbase. Default "BTC-USD". Puoi sovrascriverla nei repository variables.
          LIVE_PAIR: ${{ vars.LIVE_PAIR }}
        run: |
          python hourly_monitor.py

      - name: Save monitor state (cache)
        uses: actions/cache/save@v4
        with:
          path: .state
          key: state-${{ github.run_id }}

