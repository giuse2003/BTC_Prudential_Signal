services:
  - type: web
    name: btc-prudential-signal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn telegram_webhook:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
